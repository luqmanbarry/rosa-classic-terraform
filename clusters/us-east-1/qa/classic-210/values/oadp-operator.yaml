clusterName: classic-100
secretStoreName: platform-secrets
namespace: openshift-adp
subscriptionChannel: stable-1.4

veleroSecretKeyFile: cloud

defaultVolumesToFsBackup: true

storage:
  provider: aws
  region: us-east-1
  bucketName: rosa-classic-oadp
  bucketPrefix: classic-100
  volumeSnapshotClassName: ""
  credentialsSecretName: oadp-aws-credentials
  accessKeyIdRemoteRef: secret/oadp-aws-access-key-id
  secretAccessKeyRemoteRef: secret/oadp-aws-secret-access-key
