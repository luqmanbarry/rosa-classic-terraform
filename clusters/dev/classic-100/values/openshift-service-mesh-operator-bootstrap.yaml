clusterName: ""
secretStoreName: platform-secrets
# Operator configuration
operators:
  servicemesh:
    name: servicemeshoperator
    namespace: service-mesh-operator
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Manual
    config:
      resources:
        limits:
          cpu: 1000m
          memory: 4Gi
      nodeSelector: {}
      tolerations: {}
  kiali:
    name: kiali-ossm
    namespace: kiali-operator
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Manual
    config:
      resources:
        limits:
          cpu: 1000m
          memory: 4Gi
      nodeSelector: {}
      tolerations: {}
  otel:
    name: opentelemetry-product
    namespace: otel-operator
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Manual
    config:
      resources:
        limits:
          cpu: 1000m
          memory: 4Gi
      nodeSelector: {}
      tolerations: {}
  tempo:
    name: tempo-product
    namespace: tempo-operator
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Manual
    config:
      resources:
        limits:
          cpu: 1000m
          memory: 4Gi
      nodeSelector: {}
      tolerations: {}
    s3:
      secretName: ""
      bucket: ""
      endpoint: ""
      region: ""
      accessKeyIdRemoteRef: ""
      secretAccessKeyRemoteRef: ""

# List of tenant namespaces and their SMCP configurations
tenants: []
