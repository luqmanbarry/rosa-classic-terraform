namespaces:
  - name: team-a-dev
    displayName: Team A Development
    description: Shared development namespace for Team A
    labels:
      tenant: team-a
      environment: dev
    resourceQuota:
      name: team-a-quota
      hard:
        requests.cpu: "8"
        requests.memory: 16Gi
        limits.cpu: "16"
        limits.memory: 32Gi
        persistentvolumeclaims: "10"
    limitRange:
      name: team-a-defaults
      limits:
        - type: Container
          default:
            cpu: 500m
            memory: 1Gi
          defaultRequest:
            cpu: 100m
            memory: 256Mi
    networkPolicies:
      defaultDenyIngress: true
      allowSameNamespaceIngress: true
      allowClusterDNS: true
    roleBindings:
      - group: team-a-developers
        role: edit
      - group: team-a-operators
        role: admin
sharedTenantArgoCD:
  enabled: false
  namespace: openshift-gitops-tenants
  instanceName: tenant-gitops
  instance:
    server:
      route:
        enabled: true
      resources: {}
    controller:
      resources: {}
    repo:
      resources: {}
    redis:
      resources: {}
    applicationSet:
      resources: {}
  globalSecretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
tenants:
  - name: team-a
    enabled: false
    project_name: team-a
    description: Shared tenant Argo CD project for Team A
    namespaces:
      - team-a-dev
    source_repos:
      - https://github.com/your-org/team-a-apps.git
    admin_groups:
      - team-a-operators
    developer_groups:
      - team-a-developers
    allow_application_sets: false
    repo_credentials:
      - name: team-a-apps
        repoURL: https://github.com/your-org/team-a-apps.git
        authType: https
        external_secret:
          name: team-a-apps-repo
          refreshInterval: 1h
          secretStoreRef:
            name: platform-secrets
            kind: ClusterSecretStore
          target:
            name: team-a-apps-repo
            creationPolicy: Owner
          data:
            - secretKey: username
              remoteRef:
                key: secret/teams/classic-100/team-a/repo
                property: username
            - secretKey: password
              remoteRef:
                key: secret/teams/classic-100/team-a/repo
                property: password
