{{- if and .Values.git.username .Values.git.password }}
apiVersion: v1
kind: Secret
metadata:
  name: '{{ .Values.rootApplication.name }}-repo'
  namespace: '{{ .Values.rootApplication.namespace }}'
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: '{{ .Values.git.repoURL }}'
  username: '{{ .Values.git.username }}'
  password: '{{ .Values.git.password }}'
{{- end }}
