{{- if and .Values.operators.tempo.s3.secretName .Values.operators.tempo.s3.bucket .Values.operators.tempo.s3.endpoint .Values.operators.tempo.s3.region .Values.operators.tempo.s3.accessKeyIdRemoteRef .Values.operators.tempo.s3.secretAccessKeyRemoteRef }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.operators.tempo.s3.secretName | lower }}
  namespace: {{ .Values.operators.tempo.namespace }}
  annotations:
    managed-by: argocd.argoproj.io
    # argocd.argoproj.io/sync-wave: "43"
    # "helm.sh/hook": ""
    "helm.sh/hook-weight": "43"
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.secretStoreName }}
  data:
    - secretKey: access_key_id
      remoteRef:
        key: {{ .Values.operators.tempo.s3.accessKeyIdRemoteRef }}
    - secretKey: secret_access_key
      remoteRef:
        key: {{ .Values.operators.tempo.s3.secretAccessKeyRemoteRef }}
  target:
    name: {{ .Values.operators.tempo.s3.secretName | lower }}
    creationPolicy: "Owner"
    template:
      type: Opaque
      data:
        bucket: {{ .Values.operators.tempo.s3.bucket }}
        endpoint: {{ .Values.operators.tempo.s3.endpoint }}
        region: {{ .Values.operators.tempo.s3.region }}
        access_key_id: "{{ `{{ .access_key_id }}` }}"
        access_key_secret: "{{ `{{ .secret_access_key }}` }}"
{{- end }}
