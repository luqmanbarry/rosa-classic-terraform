{{- if and .Values.operator.install .Values.operator.createNamespace }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.operator.namespace }}
  labels:
    openshift.io/cluster-monitoring: "true"
{{- end }}
{{- if and .Values.operator.install (ne .Values.operator.namespace "openshift-operators") }}
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: trident-operator
  namespace: {{ .Values.operator.namespace }}
spec: {}
{{- end }}
{{- if .Values.operator.install }}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.operator.subscriptionName }}
  namespace: {{ .Values.operator.namespace }}
spec:
  channel: {{ .Values.operator.channel }}
  installPlanApproval: {{ .Values.operator.installPlanApproval }}
  name: {{ .Values.operator.packageName }}
  source: {{ .Values.operator.source }}
  sourceNamespace: {{ .Values.operator.sourceNamespace }}
{{- end }}
