{{- $shared := .Values.sharedTenantArgoCD | default dict }}
{{- $tenants := .Values.tenants | default list }}
{{- if $shared.enabled }}
{{- range $tenant := $tenants }}
{{- if $tenant.enabled }}
{{- $projectName := default $tenant.name $tenant.project_name }}
{{- $repoCredentials := $tenant.repo_credentials | default list }}
{{- range $repo := $repoCredentials }}
{{- $externalSecret := $repo.external_secret }}
{{- $secretStoreRef := default (dict) $externalSecret.secretStoreRef }}
{{- $target := default (dict) $externalSecret.target }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $externalSecret.name }}
  namespace: {{ $shared.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "34"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ default "1h" $externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ default $shared.globalSecretStoreRef.name $secretStoreRef.name }}
    kind: {{ default $shared.globalSecretStoreRef.kind $secretStoreRef.kind }}
  target:
    name: {{ default $repo.name (default $externalSecret.targetName $target.name) }}
    creationPolicy: {{ default "Owner" (default $externalSecret.creationPolicy $target.creationPolicy) }}
    deletionPolicy: {{ default "Retain" $externalSecret.deletionPolicy }}
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        name: {{ $repo.name | quote }}
        project: {{ $projectName | quote }}
        type: {{ default "git" $repo.type | quote }}
        url: {{ $repo.repoURL | quote }}
        {{- if eq (default "https" $repo.authType) "ssh" }}
        sshPrivateKey: '{{ "{{ .sshPrivateKey }}" }}'
        {{- else }}
        username: '{{ "{{ .username }}" }}'
        password: '{{ "{{ .password }}" }}'
        {{- end }}
        {{- if $repo.insecure }}
        insecure: "true"
        {{- end }}
        {{- if $repo.enableOCI }}
        enableOCI: "true"
        {{- end }}
  {{- with $externalSecret.data }}
  data:
{{ toYaml . | indent 4 }}
  {{- end }}
  {{- with $externalSecret.dataFrom }}
  dataFrom:
{{ toYaml . | indent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
