{{- $shared := .Values.sharedTenantArgoCD | default dict }}
{{- $tenants := .Values.tenants | default list }}
{{- if $shared.enabled }}
{{- range $tenant := $tenants }}
{{- if $tenant.enabled }}
{{- $projectName := default $tenant.name $tenant.project_name }}
{{- $deployerGroups := $tenant.developer_groups | default list }}
{{- $adminGroups := $tenant.admin_groups | default list }}
{{- $viewerGroups := $tenant.viewer_groups | default list }}
{{- $allowApplicationSets := $tenant.allow_application_sets | default false }}
{{- range $namespace := $tenant.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-argocd-deployer" $projectName }}
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "35"
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  {{- if $allowApplicationSets }}
  - apiGroups:
      - argoproj.io
    resources:
      - applicationsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-argocd-deployer" $projectName }}
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "36"
subjects:
{{- range $group := $deployerGroups }}
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ $group }}
{{- end }}
{{- range $group := $adminGroups }}
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ $group }}
{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-argocd-deployer" $projectName }}
{{- if $viewerGroups }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-argocd-viewer" $projectName }}
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "35"
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
  {{- if $allowApplicationSets }}
  - apiGroups:
      - argoproj.io
    resources:
      - applicationsets
    verbs:
      - get
      - list
      - watch
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-argocd-viewer" $projectName }}
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "36"
subjects:
{{- range $group := $viewerGroups }}
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ $group }}
{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-argocd-viewer" $projectName }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
