
# Complete var list: https://github.com/signalfx/splunk-otel-collector-chart/blob/main/helm-charts/splunk-otel-collector/values.yaml
resourceNamePrefix: rosa-gitops
secretStoreName: "platform-secrets"
hecSecretName: "splunk-platform-hec-details"

helmChart:
  name: splunk-otel-collector
  repoURL: https://signalfx.github.io/splunk-otel-collector-chart
  targetRevision: 0.110.0

# splunk-otel-collector: # subchart name to override its values.
clusterName: ""
namespaceOverride: "splunk-otel-collector"
cloudProvider: "aws" # {aws|azure|gke}
distribution: "openshift"
environment: dev
logsEnabled: true
metricsEnabled: false
tracesEnabled: false

# securityContext: {}

splunkPlatform:
  endpoint: ""
  insecureSkipVerify: false
  index: ""
  source: "kubernetes"
  maxConnections: 200
  disableCompression: false
  timeout: 30s
  idleConnTimeout: 10s

  # token can stay empty because this chart expects an ESO-managed Secret instead of inline credentials
  # token:
  retryOnFailure:
    enabled: true
    initialInterval: 5s
    maxInterval: 30s
    maxElapsedTime: 300s

logsEngine: otel
secret:
  create: false
  name: "splunk-platform-hec-details"

logsCollection:

  # Container logs collection
  containers:
    enabled: true
    containerRuntime: ""
    # Boolean for ingesting the agent's own log
    excludeAgentLogs: false

  # Configuration for collecting journald logs using otel collector
  journald:
    enabled: true
    directory: /run/log/journal
    units:
      - name: kubelet
        priority: info
      - name: docker
        priority: info
      - name: containerd
        priority: info
      - name: cri-o
        priority: info
    # Route journald logs to its own Splunk Index by specifying the index value below, else leave it blank. Please make sure the index exist in Splunk and is configured to receive HEC traffic. Not applicable to Splunk Observability.
    index: ""

agent:
  enabled: true
  service:
    enabled: true
  extraEnvs: []
  # Use volume mounts to load CA certs for TLS trust
  extraVolumes: []
  extraVolumeMounts: []


rbac:
  create: true

tolerations:
  - key: node-role.kubernetes.io/master
    effect: NoSchedule
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

securityContextConstraints:
  create: true
