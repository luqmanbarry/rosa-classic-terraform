{{- if .Values.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: RedHatInsights
metadata:
  name: openshift
  namespace: {{ .Values.namespace }}
spec:
  locals:
    credentialsSecret: {{ .Values.insights.credentialsSecret }}
{{- end }}
