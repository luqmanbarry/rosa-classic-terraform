{{- if .Values.storageClass.enabled }}
{{- $nfsServer := required "storageClass.parameters.server is required when nfs-csi storageClass is enabled" .Values.storageClass.parameters.server }}
{{- $nfsShare := required "storageClass.parameters.share is required when nfs-csi storageClass is enabled" .Values.storageClass.parameters.share }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storageClass.name }}
{{- if .Values.storageClass.defaultClass }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
{{- end }}
provisioner: nfs.csi.k8s.io
reclaimPolicy: {{ .Values.storageClass.reclaimPolicy }}
volumeBindingMode: {{ .Values.storageClass.volumeBindingMode }}
allowVolumeExpansion: {{ .Values.storageClass.allowVolumeExpansion }}
parameters:
  server: {{ $nfsServer }}
  share: {{ $nfsShare }}
{{- with .Values.storageClass.mountOptions }}
mountOptions:
{{ toYaml . | indent 2 }}
{{- end }}
{{- end }}
